<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VMbridge — security &amp; industrial automation</title>

<meta name="theme-color" content="#071119" />
<meta property="og:title" content="VMbridge — security &amp; industrial automation" />
<meta property="og:description" content="Offensive IT security meets hands-on industrial automation. Code &amp; cloud security, PLC/SCADA, ICS/OT." />
<meta property="og:image" content="https://vmbridge.github.io/vm-portfolio/logo.png" />
<meta property="og:url" content="https://vmbridge.github.io/vm-portfolio/" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@500;600&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="stylesheet" href="terminal.css" />
</head>
<body>
  <div class="veil" aria-hidden="true"></div>
  <div class="scan" aria-hidden="true"></div>

  <main class="term" id="term" tabindex="-1" aria-label="VMbridge interactive terminal">
    <header class="bar">
      <span class="bar-l"><img class="brand-logo" src="logo.png" alt="VMbridge" /> vmbridge<span class="dim">:~</span></span>
      <span class="bar-r dim"><span class="lang" id="lang"><button data-l="en" class="on" type="button">EN</button><span class="sep">/</span><button data-l="it" type="button">IT</button></span> · <span id="clock">--:--:--</span></span>
    </header>

    <div class="screen" id="screen" role="log" aria-live="polite"></div>

    <div class="hints" id="hints" aria-label="Suggested commands"></div>

    <form class="prompt" id="form" autocomplete="off">
      <label class="ps1" for="cmd">guest@vm<span class="dim">:</span><span class="path">~</span><span class="sig">$</span></label>
      <input id="cmd" name="cmd" type="text" spellcheck="false" autocapitalize="off" autocomplete="off"
             aria-label="Type a command. Try: help" />
      <span class="caret" id="caret" aria-hidden="true">▌</span>
    </form>

    <footer class="plant off" id="plant" aria-hidden="true">
      <span class="pl-lbl">PLANT<i>/</i>OT</span>
      <span class="dev"><svg class="rotor" viewBox="0 0 20 20" width="13" height="13" aria-hidden="true"><circle cx="10" cy="10" r="8.4" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M10 10 L10 2.8 M10 10 L16.2 13.6 M10 10 L3.8 13.6" stroke="currentColor" stroke-width="1.7" fill="none"/></svg><span class="tagname">P-07</span><b id="pumpSt">RUN</b></span>
      <span class="pipe">─▷</span>
      <span class="dev"><span class="tagname">FT-101</span><b id="flow">--.-</b><small>m³/h</small></span>
      <span class="pipe">─▷</span>
      <span class="dev"><span class="tagname">V-12</span><b id="valve" class="ok-t">OPEN</b></span>
      <span class="pipe">─▷</span>
      <span class="dev"><span class="tagname">LT-201</span><span class="tankbar"><i id="lvl"></i></span><b id="lvlPct">--.-</b></span>
      <span class="alm"><span class="tagname">ALM</span><b id="almTxt" class="alm-none">none</b></span>
      <span class="pl-bridge"><span class="led-b" id="ledB"></span>BRIDGE <b id="linkTxt">--</b> <i>·</i> TX <b id="txCount">0000</b></span>
    </footer>
  </main>

  <noscript>
    <div style="padding:24px;font-family:monospace;color:#c4d2d8;background:#071119">

    </div>

  <script src="terminal.js" defer></script>
</body>
</html>
