<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vp@research — Valentino Paulon</title>
<meta name="description" content="Security researcher: privilege escalation, cloud-agent security, source-level vulnerability research. Published CVEs. Available for security & IT consulting." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="terminal.css" />
</head>
<body>
  <canvas id="amb" aria-hidden="true"></canvas>
  <div class="veil" aria-hidden="true"></div>
  <div class="sweep" aria-hidden="true"></div>
  <div class="scan" aria-hidden="true"></div>

  <main class="term" id="term" tabindex="-1" aria-label="Interactive terminal portfolio">
    <header class="bar">
      <span class="bar-l"><span class="led"></span> vp@research<span class="dim">:~</span></span>
      <span class="bar-r dim"><span class="lang" id="lang"><button data-l="en" class="on" type="button">EN</button><span class="sep">/</span><button data-l="it" type="button">IT</button></span> · <span id="clock">--:--:--</span></span>
    </header>

    <div class="screen" id="screen" role="log" aria-live="polite"></div>

    <div class="hints" id="hints" aria-label="Suggested commands"></div>

    <form class="prompt" id="form" autocomplete="off">
      <label class="ps1" for="cmd">visitor@vp<span class="dim">:</span><span class="path">~</span><span class="sig">$</span></label>
      <input id="cmd" name="cmd" type="text" spellcheck="false" autocapitalize="off" autocomplete="off"
             aria-label="Type a command. Try: help" />
      <span class="caret" id="caret" aria-hidden="true">▌</span>
    </form>
  </main>

  <noscript>
    <div style="padding:24px;font-family:monospace;color:#c7c9d6;background:#0a0a0f">
      <h1 style="color:#6366f1">Valentino Paulon — security researcher</h1>
      <p>Published: CVE-2026-11837 (ansible.posix LPE, credited by Red Hat) —
      <a style="color:#a5b4fc" href="https://access.redhat.com/security/cve/CVE-2026-11837">record</a>.
      Additional CVEs and 0-day findings under coordinated disclosure.</p>
      <p>Services: code security review, cloud assessment, vulnerability research, software engineering.</p>
      <p>Contact: <a style="color:#a5b4fc" href="mailto:valentino.paulon88@gmail.com">valentino.paulon88@gmail.com</a> ·
      <a style="color:#a5b4fc" href="https://github.com/M8seven">github.com/M8seven</a></p>
    </div>
  </noscript>

  <script src="terminal.js" defer></script>
</body>
</html>
